<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeSentinel AI — Reviewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020408;
      --surface: #060d14;
      --panel: #0a1520;
      --border: #0ff3;
      --accent: #00ffe7;
      --accent2: #ff003c;
      --accent3: #7b00ff;
      --text: #c8e6f5;
      --muted: #4a7a9b;
      --glow: 0 0 20px #00ffe740, 0 0 60px #00ffe715;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      cursor: none;
      display: flex;
      flex-direction: column;
    }
    .cursor { position:fixed; width:10px; height:10px; background:var(--accent); border-radius:50%; pointer-events:none; z-index:9999; box-shadow:var(--glow); }
    .cursor-trail { position:fixed; width:26px; height:26px; border:1px solid var(--accent); border-radius:50%; pointer-events:none; z-index:9998; opacity:0.4; transition:all 0.12s; }

    body::before {
      content:''; position:fixed; inset:0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,231,0.012) 2px, rgba(0,255,231,0.012) 4px);
      pointer-events:none; z-index:900;
    }

    /* TOP BAR */
    header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 14px 30px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 1rem; font-weight: 900;
      color: var(--accent); text-shadow: var(--glow); letter-spacing: 3px;
    }
    .logo span { color: var(--accent2); }
    .header-right {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem; letter-spacing: 2px; color: var(--muted);
      display: flex; gap: 25px; align-items: center;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #28ca41; box-shadow: 0 0 8px #28ca41; display: inline-block; margin-right: 6px; animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .back-btn {
      font-family: 'Share Tech Mono', monospace; font-size:0.7rem; letter-spacing:2px;
      color: var(--muted); text-decoration:none; border:1px solid var(--border);
      padding:6px 14px; transition:all 0.3s;
    }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* MAIN LAYOUT */
    .app-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* LEFT PANEL - INPUT */
    .left-panel {
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      height: calc(100vh - 57px);
    }
    .panel-header {
      padding: 16px 25px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem; letter-spacing: 3px; color: var(--accent);
    }

    /* LANG SELECTOR */
    .lang-bar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .lang-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem; letter-spacing: 2px; color: var(--muted);
      margin-right: 5px;
    }
    .lang-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; letter-spacing: 1px;
      padding: 7px 16px;
      background: transparent; color: var(--muted);
      border: 1px solid #0ff2; cursor: none;
      transition: all 0.25s;
    }
    .lang-btn:hover, .lang-btn.active {
      background: var(--accent); color: #000;
      border-color: var(--accent); box-shadow: var(--glow);
    }

    /* CODE EDITOR */
    .editor-wrap { flex: 1; position: relative; overflow: hidden; }
    #codeInput {
      width: 100%; height: 100%;
      background: var(--bg);
      color: #a8d8ea;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.88rem; line-height: 1.7;
      border: none; outline: none; resize: none;
      padding: 25px 25px 25px 65px;
      caret-color: var(--accent);
    }
    #codeInput::placeholder { color: #1a3a4a; }
    .line-numbers {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 55px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 25px 0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.88rem; line-height: 1.7;
      color: var(--muted); text-align: right;
      padding-right: 12px;
      pointer-events: none;
      overflow: hidden;
    }

    /* BOTTOM CONTROLS */
    .controls {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      display: flex; gap: 12px; align-items: center;
    }
    #reviewBtn {
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 3px;
      padding: 14px 35px;
      background: var(--accent); color: #000;
      border: none; cursor: none;
      transition: all 0.3s; position: relative; overflow: hidden;
      flex-shrink: 0;
    }
    #reviewBtn::before {
      content: ''; position: absolute; inset: 0;
      background: #fff; transform: translateX(-105%) skewX(-15deg);
      transition: transform 0.35s;
    }
    #reviewBtn:hover::before { transform: translateX(105%) skewX(-15deg); }
    #reviewBtn span { position: relative; z-index: 1; }
    #reviewBtn:hover { box-shadow: var(--glow); }
    #reviewBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    .upload-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; letter-spacing: 2px;
      padding: 14px 20px;
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); cursor: none;
      transition: all 0.3s;
    }
    .upload-btn:hover { color: var(--accent); border-color: var(--accent); }
    #fileInput { display: none; }

    .clear-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; letter-spacing: 2px;
      padding: 14px 20px;
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); cursor: none;
      transition: all 0.3s;
      margin-left: auto;
    }
    .clear-btn:hover { color: var(--accent2); border-color: var(--accent2); }

    /* RIGHT PANEL - OUTPUT */
    .right-panel {
      display: flex; flex-direction: column;
      height: calc(100vh - 57px);
      overflow: hidden;
    }
    .output-tabs {
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex; gap: 0;
    }
    .tab-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem; letter-spacing: 2px;
      padding: 14px 18px;
      background: transparent; color: var(--muted);
      border: none; border-bottom: 2px solid transparent;
      cursor: none; transition: all 0.3s;
    }
    .tab-btn:hover { color: var(--accent); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .output-area {
      flex: 1; overflow-y: auto; padding: 25px;
    }
    .output-area::-webkit-scrollbar { width: 4px; }
    .output-area::-webkit-scrollbar-track { background: var(--surface); }
    .output-area::-webkit-scrollbar-thumb { background: var(--accent); }

    /* IDLE STATE */
    .idle-state {
      height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 15px; color: var(--muted);
    }
    .idle-icon { font-size: 3.5rem; opacity: 0.2; }
    .idle-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem; letter-spacing: 3px; opacity: 0.5;
    }

    /* LOADING */
    .loading-state {
      height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
    }
    .loading-ring {
      width: 60px; height: 60px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem; letter-spacing: 3px; color: var(--accent);
    }
    .loading-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem; letter-spacing: 2px; color: var(--muted);
    }

    /* RESULT SECTIONS */
    .score-card {
      background: var(--panel);
      border: 1px solid var(--accent);
      padding: 25px 30px;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 25px;
      box-shadow: var(--glow);
    }
    .score-num {
      font-family: 'Orbitron', monospace;
      font-size: 3rem; font-weight: 900;
      color: var(--accent); text-shadow: var(--glow);
      flex-shrink: 0;
    }
    .score-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem; letter-spacing: 3px; color: var(--muted);
    }
    .score-bar-wrap { flex: 1; }
    .score-bar {
      height: 4px; background: var(--border);
      margin-top: 8px; overflow: hidden;
    }
    .score-bar-fill {
      height: 100%; background: var(--accent);
      transition: width 1s ease;
      box-shadow: var(--glow);
    }

    .result-block {
      margin-bottom: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .result-block-header {
      padding: 12px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; letter-spacing: 2px; color: var(--accent);
    }
    .result-block-header .badge {
      background: var(--accent); color: #000;
      font-size: 0.6rem; padding: 2px 8px; letter-spacing: 1px;
    }
    .result-block-body {
      padding: 18px 20px;
      background: var(--surface);
      font-size: 0.9rem; line-height: 1.7; color: var(--text);
    }
    .result-block-body ul { padding-left: 20px; }
    .result-block-body li { margin-bottom: 6px; }
    .result-block-body pre {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.82rem; background: var(--bg);
      border: 1px solid var(--border);
      padding: 15px; overflow-x: auto;
      line-height: 1.6; color: #a8d8ea;
      margin-top: 10px;
    }
    .bug-item { color: var(--accent2); margin-bottom: 4px; }
    .improve-item { color: #98c379; }
    .security-item { color: #e5c07b; }
    .copy-btn {
      font-family: 'Share Tech Mono', monospace; font-size:0.65rem;
      letter-spacing:2px; padding:6px 14px;
      background:transparent; color:var(--muted);
      border:1px solid var(--border); cursor:none;
      transition:all 0.3s; margin-top:10px; float:right;
    }
    .copy-btn:hover { color:var(--accent); border-color:var(--accent); }

    .error-block {
      padding: 25px;
      background: #ff003c10;
      border: 1px solid var(--accent2);
      color: var(--accent2);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.82rem; letter-spacing: 1px;
    }

    /* COMPLEXITY TABLE */
    .complexity-row {
      display: flex; gap: 20px; padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .complexity-row:last-child { border-bottom: none; }
    .c-label { color: var(--muted); width: 150px; flex-shrink: 0; font-family:'Share Tech Mono',monospace; font-size:0.8rem; }
    .c-value { color: var(--accent); font-family:'Orbitron',monospace; font-size:0.85rem; }

    @media (max-width:850px) {
      .app-body { grid-template-columns:1fr; }
      .left-panel { height:50vh; }
      .right-panel { height:50vh; }
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-trail" id="cursorTrail"></div>

<header>
  <div class="logo">CODE<span>SENTINEL</span> AI</div>
  <div class="header-right">
    <span><span class="status-dot"></span>QWEN AI ONLINE</span>
    <a href="index.html" class="back-btn">← HOME</a>
  </div>
</header>

<div class="app-body">
  <!-- LEFT: INPUT -->
  <div class="left-panel">
    <div class="panel-header">
      <span class="panel-title">// INPUT CODE //</span>
      <span style="font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--muted)" id="lineCount">0 LINES</span>
    </div>

    <div class="lang-bar">
      <span class="lang-label">LANG:</span>
      <button class="lang-btn active" data-lang="python">🐍 PYTHON</button>
      <button class="lang-btn" data-lang="javascript">🌐 JS</button>
      <button class="lang-btn" data-lang="c">⚙️ C</button>
      <button class="lang-btn" data-lang="cpp">⚡ C++</button>
      <button class="lang-btn" data-lang="java">☕ JAVA</button>
    </div>

    <div class="editor-wrap">
      <div class="line-numbers" id="lineNums">1</div>
      <textarea id="codeInput" placeholder="// Paste your code here or upload a file...
// CodeSentinel AI will analyze it for:
//   ∙ Bugs & errors
//   ∙ Time & space complexity
//   ∙ Security vulnerabilities
//   ∙ Improvements
//   ∙ Optimized version
//   ∙ Score out of 10
//
// Let's make your code elite."></textarea>
    </div>

    <div class="controls">
      <button id="reviewBtn" onclick="reviewCode()"><span>⚡ ANALYZE CODE</span></button>
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📁 UPLOAD</button>
      <input type="file" id="fileInput" accept=".py,.js,.c,.cpp,.java,.txt" onchange="loadFile(event)">
      <button class="clear-btn" onclick="clearAll()">✕ CLEAR</button>
    </div>
  </div>

  <!-- RIGHT: OUTPUT -->
  <div class="right-panel">
    <div class="output-tabs">
      <button class="tab-btn active" data-tab="all" onclick="switchTab(this,'all')">ALL RESULTS</button>
      <button class="tab-btn" data-tab="bugs" onclick="switchTab(this,'bugs')">BUGS</button>
      <button class="tab-btn" data-tab="optimize" onclick="switchTab(this,'optimize')">OPTIMIZED</button>
      <button class="tab-btn" data-tab="security" onclick="switchTab(this,'security')">SECURITY</button>
    </div>

    <div class="output-area" id="outputArea">
      <div class="idle-state" id="idleState">
        <div class="idle-icon">⬡</div>
        <div class="idle-text">AWAITING CODE INPUT</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:0.6rem;letter-spacing:2px;color:var(--muted);opacity:0.4">PASTE CODE → SELECT LANGUAGE → CLICK ANALYZE</div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
